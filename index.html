<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字敦煌 - 欢迎来到敦煌世界</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body class="welcome-page">
    <div class="welcome-container dunhuang-pattern">
        <header class="welcome-header">
            <div class="seal-effect">敦·煌</div>
            <h1 class="welcome-title">数字敦煌</h1>
            <p class="welcome-subtitle">Digital Dunhuang</p>
        </header>
        
        <main class="welcome-main">
            <div class="welcome-content">
                <p class="welcome-description">
                    敦煌，丝绸之路上的璀璨明珠，世界文化遗产的瑰宝。<br>
                    这里保存着跨越千年的佛教艺术、壁画与雕塑，<br>
                    是中华文明与多元文化交融的历史见证。
                </p>
                
                <div class="welcome-features">
                    <div class="feature-item">
                        <i class="fas fa-landmark"></i>
                        <h3>千年洞窟</h3>
                        <p>探索莫高窟、榆林窟等世界级文化遗产</p>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-paint-brush"></i>
                        <h3>精美壁画</h3>
                        <p>欣赏跨越十个朝代的佛教艺术珍品</p>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-history"></i>
                        <h3>数字保护</h3>
                        <p>采用先进技术进行文化遗产数字化保存</p>
                    </div>
                </div>
                
                <div class="welcome-stats">
                    <div class="stat">
                        <span class="stat-number">735</span>
                        <span class="stat-label">个洞窟</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">10</span>
                        <span class="stat-label">个朝代</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">45000</span>
                        <span class="stat-label">㎡壁画</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">300</span>
                        <span class="stat-label">DPI精度</span>
                    </div>
                </div>
                
                <a href="index.html" class="start-button">
                    <i class="fas fa-door-open"></i> 开启敦煌之旅
                </a>
            </div>
        </main>
        
        <footer class="welcome-footer">
            <p>© 2023 数字敦煌文化保护与传承项目 | 让千年敦煌，触手可及</p>
